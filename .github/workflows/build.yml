name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for FAIL marker
        run: |
          if [ -f FAIL ]; then
            echo "FAIL marker found — failing build"
            exit 1
          fi
          echo "Build succeeded"